<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EliteLoop DemoCodex - Terms of Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="terms">
  <div class="site-bg"></div>
  <div class="modal-overlay" id="langModal">
    <div class="modal">
      <div class="modal-header">
        <h3 data-i18n="modal.selectLanguage">Select Language</h3>
        <button class="modal-close" id="closeLangModal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="lang-grid">
          <button class="lang-option" data-lang="en"><span class="lang-flag">🇬🇧</span><span class="lang-name">English</span></button>
          <button class="lang-option" data-lang="tr"><span class="lang-flag">🇹🇷</span><span class="lang-name">Turkce</span></button>
          <button class="lang-option" data-lang="ru"><span class="lang-flag">🇷🇺</span><span class="lang-name">Russkiy</span></button>
          <button class="lang-option" data-lang="ar"><span class="lang-flag">🇸🇦</span><span class="lang-name">Arabic</span></button>
          <button class="lang-option" data-lang="zh"><span class="lang-flag">🇨🇳</span><span class="lang-name">Chinese</span></button>
          <button class="lang-option" data-lang="ja"><span class="lang-flag">🇯🇵</span><span class="lang-name">Japanese</span></button>
        </div>
      </div>
    </div>
  </div>

  <header class="topbar legal-topbar">
    <a href="index.html" class="brand">
      <img src="../apple-touch-icon.png" alt="EliteLoop">
      <span>EliteLoop</span>
    </a>
    <div class="topbar-meta">
      <button class="lang-btn" id="langBtn" aria-label="Change language">
        <span class="lang-icon">🌐</span>
        <span class="lang-text">EN</span>
      </button>
      <a href="index.html" class="mini-cta" data-i18n="common.backHome">Back to home</a>
    </div>
  </header>

  <main class="legal-page">
    <section class="legal-hero">
      <div class="eyebrow" data-i18n="legal.terms.badge">Terms of Service</div>
      <h1 data-i18n="legal.terms.title">Terms that match the product's premium tone</h1>
      <p data-i18n="legal.terms.subtitle">This demo keeps the same legal destinations active while showing a more refined EliteLoop presentation.</p>
      <div class="legal-meta" data-i18n="legal.updated">Last updated: March 21, 2026</div>
    </section>
    <section class="legal-content" id="legalContent"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
