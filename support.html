<body data-page="support">
  <div class="site-bg"></div>
  <div class="modal-overlay" id="langModal">
    <div class="modal">
      <div class="modal-header">
        <h3 data-i18n="modal.selectLanguage">Select Language</h3>
        <button class="modal-close" id="closeLangModal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="lang-grid">
          <button class="lang-option" data-lang="en"><span class="lang-flag">🇬🇧</span><span class="lang-name">English</span></button>
          <button class="lang-option" data-lang="tr"><span class="lang-flag">🇹🇷</span><span class="lang-name">Türkçe</span></button>
          <button class="lang-option" data-lang="ru"><span class="lang-flag">🇷🇺</span><span class="lang-name">Русский</span></button>
          <button class="lang-option" data-lang="ar"><span class="lang-flag">🇸🇦</span><span class="lang-name">العربية</span></button>
          <button class="lang-option" data-lang="zh"><span class="lang-flag">🇨🇳</span><span class="lang-name">中文</span></button>
          <button class="lang-option" data-lang="ja"><span class="lang-flag">🇯🇵</span><span class="lang-name">日本語</span></button>
        </div>
      </div>
    </div>
  </div>

  <header class="topbar legal-topbar">
    <a href="/" class="brand">
      <img src="apple-touch-icon.png" alt="EliteLoop">
      <span>EliteLoop</span>
    </a>
    <div class="topbar-meta">
      <button class="lang-btn" id="langBtn" aria-label="Change language">
        <span class="lang-icon">🌐</span>
        <span class="lang-text">EN</span>
      </button>
      <a href="/" class="mini-cta" data-i18n="common.backHome">Back to home</a>
    </div>
  </header>

  <main class="legal-page">
    <section class="legal-hero">
      <div class="eyebrow" data-i18n="legal.support.badge">Support</div>
      <h1 data-i18n="legal.support.title">Support that feels as considered as the product</h1>
      <p data-i18n="legal.support.subtitle">Reach the EliteLoop team for account help, subscriptions, privacy questions, and general support.</p>
      <div class="legal-meta" data-i18n="legal.updated">Last updated: March 21, 2026</div>
    </section>
    <section class="legal-content" id="legalContent"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
